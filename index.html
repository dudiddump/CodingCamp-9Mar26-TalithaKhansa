<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="top-bar">
        <div class="user-profile">
            <input id="nameInput" placeholder="Enter name...">
            <button onclick="saveName()">Save</button>
        </div>
        <button onclick="toggleTheme()" id="themeBtn" class="theme-toggle">🌙</button>
    </div>

    <div class="dashboard">
        <div class="card header">
            <h1 id="clock">00:00:00</h1>
            <p id="date">Monday, January 1, 2026</p>
            <h2 id="greeting">Hello, User</h2>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Focus Timer</h3>
                <p id="timer">25:00</p>
                
                <div class="timer-settings">
                    <select id="pomodoroSelect">
                        <option value="1500">25 min</option>
                        <option value="3000">50 min</option>
                        <option value="600">10 min</option>
                        <option value="custom">Custom...</option>
                    </select>
                    <input type="number" id="customInput" placeholder="Min">
                </div>

                <div class="button-group">
                    <button class="btn-start" onclick="startTimer()">Start</button>
                    <button onclick="stopTimer()">Stop</button>
                    <button class="btn-reset" onclick="resetTimer()">Reset</button>
                </div>
            </div>

            <div class="card">
                <h3>Tasks</h3>
                <p id="taskCounter"></p>
                <div class="input-group">
                    <input id="taskInput" placeholder="Add a task...">
                    <button onclick="addTask()">Add</button>
                </div>
                <ul id="taskList"></ul>
            </div>

            <div class="card">
                <h3>Quick Links</h3>
                <div class="input-group-stack">
                    <input id="linkName" placeholder="Link Name">
                    <input id="linkURL" placeholder="URL (https://...)">
                    <button onclick="addLink()" style="width: 100%;">Add Link</button>
                </div>
                <div id="linksContainer"></div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
